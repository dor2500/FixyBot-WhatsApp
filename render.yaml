services:
  - type: web
    name: fixybotservice
    runtime: docker
    plan: free
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: KB_URL
        value: https://raw.githubusercontent.com/dor2500/FixyBot/main/helpdesk_knowledge_base_v2.md
      - key: GITHUB_REPO
        value: dor2500/FixyBot
      - key: GITHUB_TOKEN
        sync: false
